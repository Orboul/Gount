# gount configuration
# -------------------------------------------------------------------

# IP address the tracker binds to.
# Leave blank (or "0.0.0.0") to listen on all interfaces.
# Set to "127.0.0.1" to accept only local connections.
server_ip: ""

# TCP port the tracker listens on.
server_port: 8080

# Secret salt mixed into the SHA-256 User ID hash.
# CHANGE THIS before deploying — treat it like a password.
# Generate a good value with: openssl rand -hex 32
secret_salt: "CHANGE_ME_use_openssl_rand_hex_32"

# Path to the JSONL log file (relative to the binary).
# Leave blank for the default:
#   data/logs/gount.jsonl
log_path: ""

# When true, /t returns 503 if a visit cannot be written to storage.
# When false, write failures are logged and /t still returns 204.
strict_tracking_errors: false

# Which source to use for the client IP when the request comes from a trusted
# proxy. Valid values:
#   auto             -> X-Forwarded-For, then X-Real-IP, then RemoteAddr
#   x-forwarded-for  -> X-Forwarded-For, then RemoteAddr
#   x-real-ip        -> X-Real-IP, then RemoteAddr
#   remote-addr      -> always use RemoteAddr
real_ip_header: "auto"

# Reverse proxies allowed to supply X-Forwarded-For / X-Real-IP.
# Add exact IPs or CIDR ranges, for example:
#   - "127.0.0.1/32"
#   - "::1/128"
#   - "10.0.0.0/8"
# Leave empty to ignore proxy headers entirely.
trusted_proxies: []

# Storage backend: sqlite | postgres | mysql | csv | json
db_type: "sqlite"

# For sqlite, csv, json — path to the data file (relative to binary dir).
# Leave blank for the default:
#   sqlite -> data/visits.db
#   csv    -> data/visits.csv
#   json   -> data/visits.jsonl
db_path: ""

# For postgres / mysql — full DSN connection string.
# postgres example: postgres://user:pass@localhost:5432/gount?sslmode=disable
# mysql example:    user:pass@tcp(localhost:3306)/gount?parseTime=true
db_dsn: ""

# GeoLite2 edition to use: "country" (smaller, faster) or "city" (includes city name).
# This also controls which edition is auto-downloaded.
geo_type: "country"

# Path to the MaxMind GeoLite2 .mmdb file (relative to the binary directory).
# Leave blank to use the default derived from geo_type:
#   data/geodata/GeoLite2-Country.mmdb  (when geo_type: country)
#   data/geodata/GeoLite2-City.mmdb     (when geo_type: city)
geodb_path: ""

# Number of days to retain visit records.
# The background worker deletes rows older than this every 24 hours.
retention_days: 90

# Metadata only — reminds the operator how often to refresh the GeoLite2 DB.
# MaxMind updates GeoLite2 every Tuesday; bi-weekly is a sensible cadence.
update_frequency_days: 14
